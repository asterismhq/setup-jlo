# This file is auto-generated. Do not edit manually.
name: Jules Innovators

on:
  workflow_dispatch:
    inputs:
      wait_minutes:
        description: 'Minutes to wait for Jules async processing'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      wait_minutes:
        description: 'Minutes to wait for Jules async processing'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'jules-worker'
  cancel-in-progress: false

env:
  WAIT_MINUTES: ${{ github.event_name == 'workflow_call' && (inputs.wait_minutes || 30) || github.event.inputs.wait_minutes || 30 }}
  MOCK_MODE: ${{ github.event_name == 'workflow_call' && inputs.mock == true || github.event.inputs.mock == 'true' }}
  JULES_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  JLO_RUN_FLAGS: ${{ ((github.event_name == 'workflow_call' && inputs.mock == true) || github.event.inputs.mock == 'true') && '--mock' || '' }}
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'


jobs:
  # ============================================================
  # Phase 0: Bootstrap runtime repository on worker branch
  # ============================================================

  bootstrap:
    
    if: >-
      (github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      true
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: jlo workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: jlo workflow bootstrap managed-files

      - name: Clean exchange directory state
        if: ${{ env.MOCK_MODE != 'true' }}
        env:
          PRESERVE_EXCHANGE: ${{ '' }}
        run: |
          set -euo pipefail
          has_preserve=false
          preserve_args=()
          for preserve in ${PRESERVE_EXCHANGE}; do
            has_preserve=true
            preserve_args+=(--preserve "${preserve}")
          done
          if [ "${has_preserve}" = "true" ]; then
            jlo workflow bootstrap clean-exchange "${preserve_args[@]}"
          else
            jlo workflow bootstrap clean-exchange
          fi

      - name: Validate repository structure
        run: jlo workflow doctor structure

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: |
          set -euo pipefail
          jlo_version="$(jlo --version | cut -d ' ' -f 2)"
          jlo workflow create-sync-pr \
            --change-token "bootstrap" \
            --commit-message "chore: bootstrap .jules/ runtime repository [jlo ${jlo_version}]"

      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '3,1,2,4,8,16,32'


  # ============================================================
  # Phase 1: Resolve innovators matrix
  # ============================================================

  resolve-innovators-matrix:
    needs: ["bootstrap"]
    if: |
      !cancelled() &&

      needs.bootstrap.result == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    outputs:
      json: ${{ steps.resolve.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Resolve innovators targets
        id: resolve
        run: |
          set -euo pipefail
          if [ "${MOCK_MODE}" = "true" ]; then
            jlo workflow resolve matrix --layer innovators --mock
          else
            jlo workflow resolve matrix --layer innovators
          fi
  # ============================================================
  # Phase 2: Run innovators (matrix)
  # ============================================================

  
  
  
  
  
  request-innovators-run:
    needs: ["bootstrap", "resolve-innovators-matrix"]
    
    if: |
      !cancelled() &&



      needs.bootstrap.result == 'success' &&

      needs.resolve-innovators-matrix.result == 'success' &&

      fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0 &&
      fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Jules API session creation requests must run strictly one-by-one.
    # Keep max-parallel fixed to 1; worker limits are enforced by target truncation at matrix-resolution time.
    # The matrix is kept for visibility of resolved target count in the GitHub Actions GUI.
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').matrix }}
      max-parallel: 1
      fail-fast: false
    outputs:
      json: ${{ steps.run.outputs.final_stdout }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Run innovator (${{ matrix.target }})
        id: run
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo run --json innovators --role "${{ matrix.target }}" ${{ env.JLO_RUN_FLAGS }} --task create_proposals
          max_attempts: '7'
          retry_delay_schedule_seconds: '1,2,4,8,16,32'

  report-innovators-status:
    needs: ["bootstrap", "resolve-innovators-matrix", "request-innovators-run"]
    if: |
      !cancelled() &&
      always() &&
      needs.resolve-innovators-matrix.result == 'success' &&
      needs.resolve-innovators-matrix.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 70
    outputs:
      json: ${{ steps.report.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Report Run innovator status
        id: report
        env:
          REQUESTED_FLAG: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count > 0 }}
          TARGET_COUNT: ${{ fromJSON(needs.resolve-innovators-matrix.outputs.json || '{"count":0,"skipped_count":0,"matrix":[]}').count }}
          REQUEST_RESULT: ${{ needs.request-innovators-run.result }}
        run: |
          set -euo pipefail
          jlo workflow resolve matrix-run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --target-count "${TARGET_COUNT}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        if: ${{ always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for innovators'

  # ============================================================
  # Phase 3: Publish innovators proposals
  # ============================================================

  publish-innovator-issues:
    needs: [report-innovators-status]
    if: |
      needs.report-innovators-status.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Publish innovator issues
        run: jlo workflow publish innovator-issues

      - name: Validate structure
        run: jlo workflow doctor structure

      - name: Create published proposal cleanup sync PR
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain .jules)" ]; then
            echo "No proposal cleanup changes detected."
            exit 0
          fi
          jlo workflow create-sync-pr \
            --change-token "publish-innovator-issues" \
            --commit-message "jules: publish innovator proposals"


  # ============================================================
  # Phase 4: Cleanup mock artifacts
  # ============================================================


  cleanup-mock-artifacts:
    needs: ["publish-innovator-issues"]
    if: |
      !cancelled() &&
      always() &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.mock == 'true') ||
        (github.event_name == 'workflow_call' && inputs.mock == true)
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
      GITHUB_REPOSITORY: ${{ github.repository }}
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '24.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Cleanup mock artifacts for this run
        run: |
          jlo workflow clean-mock --mock-tag "$JULES_MOCK_TAG"

      - name: Validate repository structure
        run: jlo workflow doctor structure

      - name: Create mock cleanup sync PR
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain .jules)" ]; then
            echo "No mock cleanup changes detected."
            exit 0
          fi
          jlo workflow create-sync-pr \
            --change-token "mock-cleanup-${JULES_MOCK_TAG}" \
            --commit-message "jules: cleanup mock artifacts ${JULES_MOCK_TAG}"

