# Lint and Typecheck Workflow
#
# Runs Biome formatting checks, Biome lint, and TypeScript typecheck.

name: Run Linters

on:
  workflow_call:

jobs:
  run-linters:
    name: Run Linters
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Check Biome Formatting
        run: just format-check

      - name: Run Biome Lint
        run: just lint

      - name: Run TypeScript Typecheck
        run: just typecheck
