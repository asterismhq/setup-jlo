          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}
      - name: Run observer
        id: run
        if: ${{ needs.bootstrap.result == 'success' }}
        continue-on-error: true
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo run --json observers ${{ env.JLO_RUN_FLAGS }} --role "${OBSERVER_ROLE}" --task emit_requirements
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'
      - name: Report Run observer status
        id: report
        if: ${{ always() }}
        env:
          REQUESTED_FLAG: ${{ true }}
          REQUEST_RESULT: ${{ steps.run.outcome }}
          RUN_JSON: ${{ steps.run.outputs.final_stdout || '{}' }}
        run: |
          set -euo pipefail
          jlo workflow resolve run-status \
            --requested "${REQUESTED_FLAG}" \
            --result "${REQUEST_RESULT}" \
            --run-json "${RUN_JSON}"

      - name: Wait ${{ env.WAIT_MINUTES }} minutes for Jules async processing
        if: ${{ always() && steps.report.outcome == 'success' }}
        uses: akitorahayashi/wait@v1
        with:
          enabled: ${{ fromJSON(steps.report.outputs.json || '{}').requested == true }}
          minutes: ${{ env.WAIT_MINUTES }}
          seconds: ${{ env.MOCK_MODE == 'true' && '15' || '' }}
          label: 'Jules async processing for observers'

