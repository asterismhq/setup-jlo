# Jules Specialists — Single Observer Specialist Lane
#
# Runs a single observer (selected via workflow_dispatch), skips merger,
# dispatches ready requirements directly to implementer, and sends
# remaining requirements through planner before implementer execution.

name: Jules Specialists

on:
  workflow_dispatch:
    inputs:
      observer:
        description: 'Observer role to run'
        type: choice
        options:

          - consistency

          - taxonomy

          - data_arch

          - qa

          - cov

      wait_minutes:
        description: 'Minutes to wait between layers (Jules async processing time)'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false

permissions: {}

concurrency:
  group: 'jules-worker'
  cancel-in-progress: false

env:
  WAIT_MINUTES: ${{ github.event.inputs.wait_minutes || 30 }}
  MOCK_MODE: ${{ github.event.inputs.mock == 'true' }}
  JULES_MOCK_TAG: ${{ format('mock_run_{0}', github.run_id) }}
  JLO_RUN_FLAGS: ${{ github.event.inputs.mock == 'true' && '--mock' || '' }}
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'
  OBSERVER_ROLE: ${{ github.event.inputs.observer }}




jobs:
  # ============================================================
  # Phase 0: Bootstrap runtime repository on worker branch
  # ============================================================

  bootstrap:
    
    if: >-
      (github.event_name == 'workflow_dispatch' || github.event_name == 'workflow_call') &&
      
      true
      
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}


      - name: Configure Git
        run: |
          set -euo pipefail
          git config user.name "aria"
          git config user.email "aria67323@gmail.com"

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Sync worker branch
        run: jlo workflow bootstrap worker-branch

      - name: Bootstrap managed files
        run: jlo workflow bootstrap managed-files

      - name: Clean exchange directory state
        if: ${{ env.MOCK_MODE != 'true' }}
        env:
          PRESERVE_EXCHANGE: ${{ '' }}
        run: |
          set -euo pipefail
          has_preserve=false
          preserve_args=()
          for preserve in ${PRESERVE_EXCHANGE}; do
            has_preserve=true
            preserve_args+=(--preserve "${preserve}")
          done
          if [ "${has_preserve}" = "true" ]; then
            jlo workflow bootstrap clean-exchange "${preserve_args[@]}"
          else
            jlo workflow bootstrap clean-exchange
          fi

      - name: Validate repository structure
        run: jlo workflow validate

      - name: Create bootstrap sync PR to worker branch
        id: sync_pr
        run: jlo workflow create-sync-pr --preset "bootstrap"

      - name: Wait for bootstrap sync PR merge
        id: wait_for_sync_pr
        if: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').applied == true }}
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ fromJSON(steps.sync_pr.outputs.json || '{}').pr_number }}
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo workflow gh inspect-pr-merge "$PR_NUMBER"
          max_attempts: '8'
          retry_on: error
          retry_on_exit_codes: '11'
          # Sync PR merge state has an initial GitHub visibility lag after publication. The first retry waits 3s; later retries use 1,2,4,8,16,32s.
          retry_delay_schedule_seconds: '10,1,2,4,8,16,32'


  # ============================================================
  # Phase 1: Run the selected observer and wait
  # ============================================================

  
  
  
  
  run-observer:
    needs: ["bootstrap"]
    
    if: |
      !cancelled() &&


      needs.bootstrap.result == 'success'

    runs-on: ubuntu-latest
    timeout-minutes: 100
    outputs:
      json: ${{ steps.report.outputs.json }}
    env:
      JULES_API_KEY: ${{ secrets.JULES_API_KEY }}
      GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
