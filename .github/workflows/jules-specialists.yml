          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}
      - name: Run dispatcher
        id: run
        if: ${{ needs.run-observer.result == 'success' }}
        continue-on-error: true
        uses: akitorahayashi/retry@v1
        with:
          command: >-
            jlo run --json dispatcher ${{ env.JLO_RUN_FLAGS }}
          max_attempts: '8'
          retry_delay_schedule_seconds: '1,2,4,8,16,32,64'
      - name: Report Run dispatcher status
        id: report
        if: ${{ always() }}
        env:
