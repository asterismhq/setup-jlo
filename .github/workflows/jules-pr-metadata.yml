# This file is auto-generated. Do not edit manually.
name: Jules PR Metadata

on:
  push:
    branches:
      - 'jules-implementer-*'
      - 'jules-integrator-*'
      - 'jules-scribe-*'

permissions: {}

env:
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'

jobs:
  process-pr-metadata:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('jules-pr-metadata-{0}', github.ref_name) }}
      cancel-in-progress: true
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 1
          token: ${{ secrets.JLO_BOT_PAT }}

      - name: Discover PR number
        id: discover
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          BRANCH_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          PR_NUMBER=""
          # Poll for up to 2 minutes (24 * 5s) for the PR to be created, as there can be a
          # delay between the push event and the PR being available via the API.
          ATTEMPTS=24
          for _ in $(seq 1 "$ATTEMPTS"); do
            PR_NUMBER=$(gh pr list --head "$BRANCH_NAME" --repo "$REPO" --json number -q '.[0].number')
            if [ -n "$PR_NUMBER" ]; then
              break
            fi
            sleep 5
          done
          if [ -z "$PR_NUMBER" ]; then
            echo "::notice::No PR found yet for branch $BRANCH_NAME. Skipping metadata sync."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"

      - name: Install jlo
        if: steps.discover.outputs.found == 'true'
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_RELEASE_PAT }}
          version: '23.2.0'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Sync PR metadata label
        if: steps.discover.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ steps.discover.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            jules-implementer-*)
              jlo workflow process pr sync-category-label "$PR_NUMBER" --fail-on-error
              ;;
            jules-integrator-*)
              gh label create "integration" --color "000000" --description "Integration PR merging multiple implementer branches" --repo "$REPO" --force
              gh pr edit "$PR_NUMBER" --add-label "integration" --repo "$REPO"
              ;;
            jules-scribe-*)
              jlo workflow process pr sync-category-label "$PR_NUMBER" --fail-on-error
              ;;
            *)
              echo "::error::Unknown PR metadata branch '${GITHUB_REF_NAME}'."
              exit 1
              ;;
          esac

      - name: Validate linked GitHub token
        if: steps.discover.outputs.found == 'true'
        env:
          LINKED_GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${LINKED_GH_TOKEN}" ]; then
            echo "::error::JULES_LINKED_GH_PAT is required for PR metadata summary request comments."
            exit 1
          fi

      - name: Post summary request comment
        if: steps.discover.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: |
          set -euo pipefail
          jlo workflow process pr comment-summary-request ${{ steps.discover.outputs.pr_number }} --fail-on-error
