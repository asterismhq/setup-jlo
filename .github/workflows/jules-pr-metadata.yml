# This file is auto-generated. Do not edit manually.
name: Jules PR Metadata

on:
  push:
    branches:
      - 'jules-implementer-*'
      - 'jules-integrator-*'
      - 'jules-scribe-*'

permissions: {}

env:
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'

jobs:
  process-pr-metadata:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('jules-pr-metadata-{0}', github.ref_name) }}
      cancel-in-progress: true
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'jules'
          fetch-depth: 1
          token: ${{ secrets.JLO_BOT_PAT }}

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Discover PR number
        id: discover
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          BRANCH_NAME: ${{ github.ref_name }}
        with:
          command: >-
            jlo workflow gh discover-pr "${BRANCH_NAME}"
          max_attempts: '7'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_schedule_seconds: '1,2,4,8,16,32'

      - name: Sync PR metadata label
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
          PR_NUMBER: ${{ steps.discover.outputs.pr_number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          case "${GITHUB_REF_NAME}" in
            jules-implementer-*)
              jlo workflow gh sync-pr-category-label "$PR_NUMBER"
              ;;
            jules-integrator-*)
              gh label create "integration" --color "000000" --description "Integration PR merging multiple implementer branches" --repo "$REPO" --force
              gh pr edit "$PR_NUMBER" --add-label "integration" --repo "$REPO"
              ;;
            jules-scribe-*)
              jlo workflow gh sync-pr-category-label "$PR_NUMBER"
              ;;
            *)
              echo "::error::Unknown PR metadata branch '${GITHUB_REF_NAME}'."
              exit 1
              ;;
          esac

      - name: Validate linked GitHub token
        env:
          LINKED_GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${LINKED_GH_TOKEN}" ]; then
            echo "::error::JULES_LINKED_GH_PAT is required for PR metadata summary request comments."
            exit 1
          fi

      - name: Post summary request comment
        env:
          GH_TOKEN: ${{ secrets.JULES_LINKED_GH_PAT }}
        run: |
          set -euo pipefail
          jlo workflow gh post-pr-summary-request ${{ steps.discover.outputs.pr_number }}
