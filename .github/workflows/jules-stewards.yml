# This file is auto-generated. Do not edit manually.
# Jules Stewards
#
# Calls reusable worker workflows in a serialized chain for repository-level
# stewardship flow.

name: Jules Stewards

on:
  workflow_dispatch:
    inputs:
      stewards_entry_point:
        description: 'Start from workflow'
        type: choice
        options:
          - scribe
          - optimizers
          - innovators
        default: scribe
      wait_minutes:
        description: 'Minutes to wait between layers (Jules async processing time)'
        type: number
        default: 30
      mock:
        description: 'Run in mock mode (creates branches/PRs without Jules API)'
        type: boolean
        default: false

permissions: {}

# The caller workflow keeps its own lock identity.
# Reused worker workflows keep the shared `jules-worker` lock.
# Using the same concurrency group in both caller and callee causes
# GitHub Actions deadlock/cancellation for the reusable jobs.
concurrency:
  group: 'jules-stewards'
  cancel-in-progress: false

env:
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'

jobs:
  # ============================================================
  # Phase 0: Resolve stewards chain plan
  # ============================================================
  resolve-stewards-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      json: ${{ steps.check.outputs.json }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: 'main'
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Resolve stewards plan
        id: check
        env:
          ENTRY_POINT: ${{ github.event.inputs.stewards_entry_point || 'scribe' }}
        run: |
          set -euo pipefail
          jlo workflow resolve stewards-plan --entry-point "$ENTRY_POINT"


  # ============================================================
  # Phase 1: Run scribe workflow
  # ============================================================
  run-scribe:
    needs: [resolve-stewards-plan]
    if: |
      !cancelled() &&
      needs.resolve-stewards-plan.result == 'success' &&
      fromJSON(needs.resolve-stewards-plan.outputs.json || '{}').run_scribe == true
    uses: ./.github/workflows/jules-scribe.yml
    secrets: inherit
    with:
      mock: ${{ github.event.inputs.mock == 'true' }}

  # ============================================================
  # Phase 2: Run optimizers workflow
  # ============================================================
  run-optimizers:
    needs: [resolve-stewards-plan, run-scribe]
    if: |
      !cancelled() &&
      needs.resolve-stewards-plan.result == 'success' &&
      fromJSON(needs.resolve-stewards-plan.outputs.json || '{}').run_optimizers == true &&
      (needs.run-scribe.result == 'success' || needs.run-scribe.result == 'skipped')
    uses: ./.github/workflows/jules-optimizers.yml
    secrets: inherit
    with:
      entry_point: observers
      wait_minutes: ${{ fromJSON(github.event.inputs.wait_minutes || '30') }}
      mock: ${{ github.event.inputs.mock == 'true' }}

  # ============================================================
  # Phase 3: Run innovators workflow
  # ============================================================
  run-innovators:
    needs: [resolve-stewards-plan, run-optimizers]
    if: |
      !cancelled() &&
      needs.resolve-stewards-plan.result == 'success' &&
      fromJSON(needs.resolve-stewards-plan.outputs.json || '{}').run_innovators == true &&
      (needs.run-optimizers.result == 'success' || needs.run-optimizers.result == 'skipped')
    uses: ./.github/workflows/jules-innovators.yml
    secrets: inherit
    with:
      wait_minutes: ${{ fromJSON(github.event.inputs.wait_minutes || '30') }}
      mock: ${{ github.event.inputs.mock == 'true' }}
