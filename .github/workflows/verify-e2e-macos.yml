# Verify E2E on macOS
#
# Runs end-to-end verification of the local `setup-astm` action implementation
# on macOS runners when explicitly dispatched.

name: Verify E2E on macOS

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Semver release version of astm to install
        required: true
        default: 23.2.0
        type: string

permissions:
  contents: read

jobs:
  release-macos:
    name: Release Install on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Action Distribution
        run: npm run package

      - name: Run setup-astm in Release Mode
        id: setup_astm
        uses: ./
        with:
          token: ${{ secrets.ASTM_RELEASE_PAT }}
          version: ${{ inputs.release_version }}

      - name: Verify Action Outputs
        run: |
          test "${{ steps.setup_astm.outputs.version-ref }}" = "${{ inputs.release_version }}"
          test "${{ steps.setup_astm.outputs.install-mode }}" = "release-tag"

      - name: Verify Installed astm Binary
        run: |
          command -v astm
          astm --version

  main-macos:
    name: Main Install on macOS
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Action Distribution
        run: npm run package

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run setup-astm in Main Mode
        id: setup_astm
        uses: ./
        with:
          token: ${{ secrets.ASTM_RELEASE_PAT }}
          version: main
          submodule_token: ${{ secrets.ASTM_SUBMODULE_PAT }}

      - name: Verify Action Outputs
        run: |
          test "${{ steps.setup_astm.outputs.version-ref }}" = "main"
          test "${{ steps.setup_astm.outputs.install-mode }}" = "main"

      - name: Verify Installed astm Binary
        run: |
          command -v astm
          astm --version
