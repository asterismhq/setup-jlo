# This file is auto-generated. Do not edit manually.
name: Jules Auto-merge

on:
  push:
    branches:
      - 'jules-observer-*'
      - 'jules-merger-*'
      - 'jules-dispatcher-*'
      - 'jules-planner-*'
      - 'jules-innovators-*'
      - 'jules-reporter-*'
      - 'jules-worker-sync-*'

permissions: {}

env:
  JLO_TARGET_BRANCH: 'main'
  JULES_WORKER_BRANCH: 'jules'

jobs:
  validate-and-automerge:
    if: ${{ github.event.deleted == false }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ format('jules-automerge-branch-{0}', github.ref_name) }}
      cancel-in-progress: false
    steps:
      - name: Validate branch variables
        run: |
          set -euo pipefail
          if [ -z "${JLO_TARGET_BRANCH:-}" ]; then
            echo "::error::JLO_TARGET_BRANCH is required."
            exit 1
          fi
          if [ -z "${JULES_WORKER_BRANCH:-}" ]; then
            echo "::error::JULES_WORKER_BRANCH is required."
            exit 1
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.JLO_BOT_PAT }}

      - name: Install jlo
        uses: asterismhq/setup-jlo@v1
        with:
          token: ${{ secrets.JLO_INSTALL_PAT }}
          version: '25.0.1'
          submodule_token: ${{ secrets.JLO_SUBMODULE_PAT }}

      - name: Discover open PR for pushed branch
        id: discover
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
        with:
          command: >-
            jlo workflow gh discover-pr "${GITHUB_REF_NAME}"
          max_attempts: '12'
          retry_on: error
          retry_on_exit_codes: '11'
          retry_delay_schedule_seconds: '1,2,5,5,5,5,5,5,5,5,5'

      - name: Validate branch contract
        run: |
          set -euo pipefail
          echo "::group::Validate check"

          mode=""
          layer=""
          case "${GITHUB_REF_NAME}" in
            jules-observer-*)
              mode="layer"
              layer="observers"
              ;;
            jules-merger-*)
              mode="layer"
              layer="merger"
              ;;
            jules-dispatcher-*)
              mode="layer"
              layer="dispatcher"
              ;;
            jules-planner-*)
              mode="layer"
              layer="planner"
              ;;
            jules-innovators-*)
              mode="layer"
              layer="innovators"
              ;;
            jules-reporter-*)
              mode="layer"
              layer="reporter"
              ;;
            jules-worker-sync-*)
              mode="structure"
              ;;
            *)
              echo "::error::Unknown automerge branch '${GITHUB_REF_NAME}'."
              exit 1
              ;;
          esac

          if [ "${mode}" = "structure" ]; then
            jlo workflow validate
          else
            jlo workflow validate --after-layer "${layer}"
          fi
          echo "::endgroup::"

      - name: Process PR auto-merge
        uses: akitorahayashi/retry@v1
        env:
          GH_TOKEN: ${{ secrets.JLO_BOT_PAT }}
        with:
          command: >-
            jlo workflow gh enable-pr-automerge ${{ steps.discover.outputs.pr_number }}
          max_attempts: '7'
          timeout_seconds: '300'
          retry_delay_schedule_seconds: '1,2,4,8,16,32'
          retry_on: any
          termination_grace_seconds: '5'
