# Release Workflow
#
# Builds the distribution on main, creates release tags, and publishes a GitHub release.

name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version in X.Y.Z format
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate Release Request
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.version.outputs.release_tag }}
      major_tag: ${{ steps.version.outputs.major_tag }}

    steps:
      - id: version
        name: Resolve release tags
        env:
          RELEASE_VERSION: ${{ inputs.version }}
        run: |
          if [[ "${GITHUB_REF_NAME}" != "main" ]]; then
            echo "Release workflow must run from main, got '${GITHUB_REF_NAME}'." >&2
            exit 1
          fi
          if [[ ! "${RELEASE_VERSION}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Expected release version in X.Y.Z format, got '${RELEASE_VERSION}'." >&2
            exit 1
          fi
          RELEASE_TAG="v${RELEASE_VERSION}"
          echo "release_tag=${RELEASE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "major_tag=v${BASH_REMATCH[1]}" >> "${GITHUB_OUTPUT}"

  static-checks:
    name: Static Checks
    uses: ./.github/workflows/run-static-checks.yml

  test:
    name: Test
    uses: ./.github/workflows/run-tests.yml

  release:
    name: Publish Release
    needs: [validate-release, static-checks, test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Development Environment
        uses: ./.github/actions/setup

      - name: Build Action Distribution
        run: npm run package

      - name: Commit Distribution
        id: dist
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
        run: |
          if git diff --quiet -- dist; then
            echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add dist
          git commit -m "Release ${RELEASE_TAG}"
          git push origin HEAD:main
          echo "commit_sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Create Release Tags
        env:
          RELEASE_TAG: ${{ needs.validate-release.outputs.release_tag }}
          MAJOR_TAG: ${{ needs.validate-release.outputs.major_tag }}
          COMMIT_SHA: ${{ steps.dist.outputs.commit_sha }}
        run: |
          if git rev-parse -q --verify "refs/tags/${RELEASE_TAG}" >/dev/null; then
            echo "Release tag '${RELEASE_TAG}' already exists." >&2
            exit 1
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag --annotate "${RELEASE_TAG}" --message "Release ${RELEASE_TAG}" "${COMMIT_SHA}"
          git tag --force --annotate "${MAJOR_TAG}" --message "Update ${MAJOR_TAG} to ${RELEASE_TAG}" "${COMMIT_SHA}"
          git push origin "refs/tags/${RELEASE_TAG}"
          git push origin "refs/tags/${MAJOR_TAG}" --force

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-release.outputs.release_tag }}
          generate_release_notes: true
