name: setup-jlo
description: Set up the jlo CLI for a specified jlo version token
inputs:
  token:
    description: GitHub token with read access to asterismhq/jlo release assets and source
    required: true
  version:
    description: jlo version token to install, such as 23.0.0 or main
    required: true
  submodule_token:
    description: Optional token for authenticated submodule fetch in main mode
    required: false
outputs:
  version-token:
    description: Raw token passed to the version input
  install-mode:
    description: Resolved installation mode (release-tag or main)
runs:
  using: node24
  main: dist/index.js
