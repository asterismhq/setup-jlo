name: setup-jlo
description: Set up the jlo CLI for a specified jlo version ref
inputs:
  token:
    description: GitHub token with read access to asterismhq/jlo release assets and source
    required: true
  version:
    description: jlo version ref to install, such as 23.0.0 or main; a leading v is also accepted for semver releases
    required: true
  submodule_token:
    description: Token for required authenticated submodule fetch in main mode. Required when version is main.
    required: false
outputs:
  version-ref:
    description: Raw version ref passed to the version input
  install-mode:
    description: Resolved installation mode (release-tag or main)
runs:
  using: node24
  main: dist/index.js
