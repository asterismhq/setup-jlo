name: setup-astm
description: Set up the Asterism (astm) CLI for a specified version ref
inputs:
  token:
    description: GitHub token with read access to asterismhq/asterism release assets and source
    required: true
  version:
    description: astm version ref to install, such as 27.0.0 or main; a leading v is also accepted for semver releases
    required: true
  submodule_token:
    description: Token for required authenticated submodule fetch in main mode. Required when version is main.
    required: false
outputs:
  version-ref:
    description: Raw version ref passed to the version input
  install-mode:
    description: Resolved installation mode (release-tag or main)
runs:
  using: node24
  main: dist/index.js
